openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Invoice Automation System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: invoices
    description: Invoice management
  - name: vendors
    description: Vendor management
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /invoices:
    get:
      operationId: listInvoices
      tags: [invoices]
      summary: List all invoices
      parameters:
        - in: query
          name: status
          schema:
            type: string
          required: false
        - in: query
          name: duplicate_status
          schema:
            type: string
          required: false
      responses:
        "200":
          description: List of invoices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InvoiceRow"

  /invoices/summary:
    get:
      operationId: getInvoiceSummary
      tags: [invoices]
      summary: Get invoice summary stats for dashboard cards
      responses:
        "200":
          description: Summary stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceSummary"

  /invoices/process:
    post:
      operationId: processInvoice
      tags: [invoices]
      summary: Process an extracted invoice (JSON, file already on disk)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProcessInvoiceRequest"
      responses:
        "201":
          description: Invoice processed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProcessInvoiceResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /invoices/upload:
    post:
      operationId: uploadInvoice
      tags: [invoices]
      summary: Upload an invoice file (PDF/JPG/PNG) and process it
      parameters:
        - in: query
          name: source
          schema:
            type: string
            enum: [upload, camera]
          required: false
          description: Source of the file (upload or camera)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: Invoice file (PDF, JPG, PNG — max 20MB)
                extracted:
                  type: string
                  description: Optional JSON string with pre-extracted fields
              required:
                - file
      responses:
        "201":
          description: Invoice uploaded and processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProcessInvoiceResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /invoices/{id}/approve:
    patch:
      operationId: approveInvoice
      tags: [invoices]
      summary: Approve an invoice
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Invoice approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404":
          description: Invoice not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /invoices/{id}/mark-not-duplicate:
    patch:
      operationId: markInvoiceNotDuplicate
      tags: [invoices]
      summary: Mark invoice as not a duplicate
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Invoice marked as not duplicate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404":
          description: Invoice not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /invoices/{id}/category:
    patch:
      operationId: updateInvoiceCategory
      tags: [invoices]
      summary: Override the suggested category for an invoice
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCategoryRequest"
      responses:
        "200":
          description: Category updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Invoice not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /invoices/{id}/merge-alias:
    patch:
      operationId: mergeVendorAlias
      tags: [invoices]
      summary: Merge a vendor alias for an invoice
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MergeAliasRequest"
      responses:
        "200":
          description: Alias merged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /vendors:
    get:
      operationId: listVendors
      tags: [vendors]
      summary: List all vendors with aliases
      responses:
        "200":
          description: List of vendors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VendorWithAliases"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success
        - message

    ProcessInvoiceRequest:
      type: object
      properties:
        filePath:
          type: string
          description: Path to the invoice file on disk
        extracted:
          $ref: "#/components/schemas/ExtractedInvoiceData"
        extractionConfidence:
          type: number
          nullable: true
        sourceType:
          type: string
          enum: [upload, camera, email]
          nullable: true
        documentType:
          type: string
          enum: [supplier_invoice, receipt, credit_note, other]
          nullable: true
      required:
        - filePath
        - extracted

    ExtractedInvoiceData:
      type: object
      properties:
        vendor:
          type: string
          nullable: true
        tax_id:
          type: string
          nullable: true
        invoice_number:
          type: string
          nullable: true
        date:
          type: string
          nullable: true
        subtotal:
          type: number
          nullable: true
        vat:
          type: number
          nullable: true
        total:
          type: number
          nullable: true
        currency:
          type: string
          nullable: true

    ProcessInvoiceResponse:
      type: object
      properties:
        invoiceId:
          type: string
        vendorId:
          type: string
          nullable: true
        canonicalVendorName:
          type: string
          nullable: true
        vendorMatchMethod:
          type: string
          nullable: true
        duplicateStatus:
          type: string
        duplicateOfInvoiceId:
          type: string
          nullable: true
        confidence:
          type: number
        status:
          type: string
        suggestedCategory:
          type: string
          nullable: true
        categoryConfidence:
          type: number
        filePath:
          type: string
          nullable: true
      required:
        - invoiceId
        - duplicateStatus
        - confidence
        - status
        - categoryConfidence

    InvoiceSummary:
      type: object
      properties:
        total_documents:
          type: integer
        supplier_invoices:
          type: integer
        total_amount:
          type: string
        total_vat:
          type: string
        pending_review:
          type: integer
        suspected_duplicates:
          type: integer
      required:
        - total_documents
        - supplier_invoices
        - total_amount
        - total_vat
        - pending_review
        - suspected_duplicates

    InvoiceRow:
      type: object
      properties:
        id:
          type: string
        rawVendorName:
          type: string
          nullable: true
        normalizedVendorName:
          type: string
          nullable: true
        canonicalVendorName:
          type: string
          nullable: true
        taxId:
          type: string
          nullable: true
        invoiceNumber:
          type: string
          nullable: true
        invoiceDate:
          type: string
          nullable: true
        subtotal:
          type: string
          nullable: true
        vat:
          type: string
          nullable: true
        total:
          type: string
          nullable: true
        currency:
          type: string
        filePath:
          type: string
        duplicateStatus:
          type: string
        duplicateOfInvoiceId:
          type: string
          nullable: true
        status:
          type: string
        extractionConfidence:
          type: string
          nullable: true
        vendorId:
          type: string
          nullable: true
        sourceType:
          type: string
        documentType:
          type: string
        suggestedCategory:
          type: string
          nullable: true
        finalCategory:
          type: string
          nullable: true
        categoryConfidence:
          type: string
          nullable: true
        createdAt:
          type: string
      required:
        - id
        - currency
        - filePath
        - duplicateStatus
        - status
        - sourceType
        - documentType
        - createdAt

    UpdateCategoryRequest:
      type: object
      properties:
        finalCategory:
          type: string
      required:
        - finalCategory

    MergeAliasRequest:
      type: object
      properties:
        aliasName:
          type: string
        targetVendorId:
          type: string
      required:
        - aliasName
        - targetVendorId

    VendorWithAliases:
      type: object
      properties:
        id:
          type: string
        canonicalName:
          type: string
        taxId:
          type: string
          nullable: true
        aliases:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              aliasName:
                type: string
              normalizedAlias:
                type: string
            required:
              - id
              - aliasName
              - normalizedAlias
      required:
        - id
        - canonicalName
        - aliases
