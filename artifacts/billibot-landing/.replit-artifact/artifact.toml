kind = "web"
previewPath = "/billibot-landing/"
title = "BILLIBOT+ — אתר תדמית"
version = "1.0.0"
id = "artifacts/billibot-landing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/billibot-landing/" ]
localPort = 21928

[services.development]
run = "pnpm --filter @workspace/billibot-landing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/billibot-landing", "run", "build" ]
publicDir = "artifacts/billibot-landing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21928"
BASE_PATH = "/billibot-landing/"
