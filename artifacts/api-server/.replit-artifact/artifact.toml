kind = "api"
previewPath = "/api"
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "web"
paths = ["/api"]

[services.development]
run = "pnpm --filter @workspace/api-server run dev"

[services.env]
PORT = "8080"

[services.production]
build = ["pnpm", "--filter", "@workspace/api-server", "run", "build"]
run = "pnpm --filter @workspace/api-server run start"
