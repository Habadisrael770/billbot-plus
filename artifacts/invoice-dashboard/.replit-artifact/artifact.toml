kind = "web"
previewPath = "/"
title = "Invoice Dashboard"
version = "1.0.0"
id = "artifacts/invoice-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 19180
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/invoice-dashboard run dev"

[services.env]
PORT = "19180"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/invoice-dashboard", "run", "build"]
publicDir = "artifacts/invoice-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
